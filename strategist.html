<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strategist Performance — Uptown Creation</title>
  <link rel="icon" type="image/png" href="https://cdn.prod.website-files.com/64ecf9fb0fb216ac640ea64a/652e9dbbc7a19b06feb5076f_UN_Favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --navy: #013A52; --navy-dark: #012a3d; --navy-light: #edf3f6; --navy-mid: rgba(1,58,82,.06);
      --green: #1EB683; --green-dark: #18a374; --green-light: #e4f7f0; --green-glow: rgba(30,182,131,.15);
      --gray-mid: #A8B4C4;
      --white: #ffffff; --bg: #f0f3f5;
      --gray-100: #e8ecef; --gray-200: #d4dade; --gray-400: #8899a6; --gray-600: #4d5f6b;
      --red: #e53e3e; --red-light: #fff0f0;
      --amber: #f59e0b; --amber-light: #fef3c7;
      --blue: #3b9fd4; --blue-light: #e8f4fb;
      --r: 10px; --r-lg: 16px; --r-pill: 999px;
      --shadow-xs: 0 1px 3px rgba(1,58,82,.06), 0 1px 2px rgba(1,58,82,.04);
      --shadow-sm: 0 2px 8px rgba(1,58,82,.08), 0 1px 3px rgba(1,58,82,.05);
      --shadow-md: 0 8px 24px rgba(1,58,82,.10), 0 2px 8px rgba(1,58,82,.06);
      --shadow-lg: 0 20px 60px rgba(1,58,82,.18), 0 4px 16px rgba(1,58,82,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--navy); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    /* HEADER */
    .header { background: linear-gradient(135deg, #013A52 0%, #01526e 100%); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 66px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-md); }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .btn-back { display: flex; align-items: center; gap: 7px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.14); color: rgba(255,255,255,.8); padding: 7px 14px; border-radius: var(--r-pill); cursor: pointer; font-size: 11px; font-family: 'Montserrat', sans-serif; font-weight: 600; text-decoration: none; transition: all .2s; letter-spacing: .05em; text-transform: uppercase; }
    .btn-back:hover { background: rgba(255,255,255,.16); color: #fff; }
    .header-pipe { width: 1px; height: 28px; background: rgba(255,255,255,.12); }
    .header-title { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: .02em; }
    .header-sub-text { font-size: 11px; color: rgba(168,180,196,.7); font-weight: 500; letter-spacing: .04em; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .btn-refresh { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.14); color: rgba(255,255,255,.7); padding: 7px 16px; border-radius: var(--r-pill); cursor: pointer; font-size: 11px; font-family: 'Montserrat', sans-serif; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: all .2s; letter-spacing: .05em; text-transform: uppercase; }
    .btn-refresh:hover { background: var(--green); border-color: var(--green); color: #fff; }
    #last-updated { font-size: 11px; color: rgba(168,180,196,.7); }

    /* FILTER BAR */
    .filter-bar { background: var(--white); border-bottom: 1px solid var(--gray-100); padding: 12px 40px; display: flex; align-items: center; gap: 10px; position: sticky; top: 66px; z-index: 90; box-shadow: var(--shadow-xs); }
    .filter-label { font-size: 10px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: .1em; }
    .btn-period { height: 32px; padding: 0 14px; background: var(--bg); color: var(--gray-600); border: 1.5px solid var(--gray-100); border-radius: var(--r-pill); font-size: 11px; font-family: 'Montserrat', sans-serif; font-weight: 700; cursor: pointer; transition: all .15s; letter-spacing: .04em; }
    .btn-period:hover { border-color: var(--navy); color: var(--navy); }
    .btn-period.active { background: var(--navy); color: #fff; border-color: var(--navy); }
    .filter-spacer { flex: 1; }
    .sort-label { font-size: 11px; color: var(--gray-400); font-weight: 600; }
    .sort-select { height: 32px; padding: 0 12px; border: 1.5px solid var(--gray-100); border-radius: var(--r-pill); font-size: 11px; font-family: 'Montserrat', sans-serif; font-weight: 600; color: var(--navy); background: var(--bg); outline: none; cursor: pointer; }

    /* MAIN */
    .main { max-width: 1440px; margin: 0 auto; padding: 36px 48px 72px; }

    /* SUMMARY CARDS */
    .summary-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 32px; }
    .summary-card { background: var(--white); border-radius: var(--r-lg); padding: 22px 24px; box-shadow: var(--shadow-xs); border: 1px solid rgba(255,255,255,.8); position: relative; overflow: hidden; transition: box-shadow .25s, transform .25s; animation: fadeUp .5s ease both; }
    .summary-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .summary-card:nth-child(1) { animation-delay:  0ms; }
    .summary-card:nth-child(2) { animation-delay: 60ms; }
    .summary-card:nth-child(3) { animation-delay:120ms; }
    .summary-card:nth-child(4) { animation-delay:180ms; }
    .summary-card:nth-child(5) { animation-delay:240ms; }
    .summary-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px; }
    .summary-card:nth-child(1)::before { background: var(--green); }
    .summary-card:nth-child(2)::before { background: var(--navy); }
    .summary-card:nth-child(3)::before { background: var(--blue); }
    .summary-card:nth-child(4)::before { background: var(--amber); }
    .summary-card:nth-child(5)::before { background: var(--green); }
    .summary-card:first-child { background: linear-gradient(135deg, var(--navy) 0%, #01526e 100%); border-color: transparent; }
    .summary-card:first-child .summary-value { color: #fff; }
    .summary-card:first-child .summary-label { color: rgba(168,180,196,.8); }
    .summary-card:first-child::before { background: var(--green); }
    .summary-value { font-size: 28px; font-weight: 800; color: var(--navy); line-height: 1; margin-bottom: 8px; }
    .summary-label { font-size: 10px; color: var(--gray-400); text-transform: uppercase; letter-spacing: .07em; font-weight: 600; }

    /* LEADERBOARD + TABLE */
    .section { background: var(--white); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); border: 1px solid rgba(255,255,255,.8); margin-bottom: 28px; overflow: hidden; }
    .section-hdr { padding: 20px 28px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; }
    .section-title { font-size: 11px; font-weight: 800; color: var(--navy); text-transform: uppercase; letter-spacing: .09em; }
    .section-hint { font-size: 10px; color: var(--gray-400); font-weight: 600; }

    /* STRATEGIST CARDS GRID */
    .strat-grid { display: grid; grid-template-columns: 1fr; gap: 24px; padding: 28px; }
    .strat-card { background: var(--white); border-radius: var(--r-lg); box-shadow: var(--shadow-xs); border: 1px solid var(--gray-100); overflow: hidden; transition: box-shadow .25s, transform .25s; cursor: pointer; animation: fadeUp .45s ease both; }
    .strat-card:nth-child(1) { animation-delay:  0ms; }
    .strat-card:nth-child(2) { animation-delay: 80ms; }
    .strat-card:nth-child(3) { animation-delay:160ms; }
    .strat-card:nth-child(4) { animation-delay:240ms; }
    .strat-card:nth-child(5) { animation-delay:320ms; }
    .strat-card:hover { box-shadow: 0 10px 30px rgba(1,58,82,.12), 0 2px 8px rgba(30,182,131,.06); transform: translateY(-3px); }
    .strat-card-header { background: linear-gradient(135deg, var(--navy) 0%, #01526e 100%); padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; }
    .strat-name { font-size: 16px; font-weight: 800; color: #fff; }
    .strat-client-count { font-size: 11px; color: rgba(168,180,196,.8); font-weight: 600; margin-top: 4px; }
    .strat-rank { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,.12); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #fff; flex-shrink: 0; }
    .strat-rank.rank-1 { background: #f59e0b; color: #fff; }
    .strat-rank.rank-2 { background: var(--gray-400); color: #fff; }
    .strat-rank.rank-3 { background: #cd7f32; color: #fff; }
    .strat-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--gray-100); }
    .strat-metric { background: var(--white); padding: 18px 14px; text-align: center; transition: background .15s; }
    .strat-metric:hover { background: var(--navy-light); }
    .strat-metric-val { font-size: 18px; font-weight: 800; color: var(--navy); line-height: 1; margin-bottom: 6px; transition: color .15s; }
    .strat-metric-lbl { font-size: 9px; color: var(--gray-400); text-transform: uppercase; letter-spacing: .07em; font-weight: 600; }
    .strat-footer { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 8px; border-top: 1px solid var(--gray-100); }
    .strat-flags { display: flex; gap: 6px; flex-wrap: wrap; }

    /* BADGES */
    .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: var(--r-pill); font-size: 9px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; white-space: nowrap; }
    .badge-good   { background: var(--green-light); color: var(--green-dark); }
    .badge-warn   { background: var(--amber-light); color: #92400e; }
    .badge-bad    { background: var(--red-light); color: var(--red); }
    .badge-navy   { background: var(--navy-light); color: var(--navy); }

    /* COMPARISON TABLE */
    .comp-table { width: 100%; border-collapse: collapse; min-width: 900px; }
    .comp-table th { background: var(--bg); border-bottom: 2px solid var(--gray-100); padding: 12px 18px; text-align: left; font-size: 10px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: .07em; white-space: nowrap; cursor: pointer; user-select: none; transition: all .15s; }
    .comp-table th:hover { color: var(--navy); background: #e4e8eb; }
    .comp-table th.sorted { color: var(--green); background: var(--green-light); }
    .comp-table th.sorted::after { content: ' ↑'; }
    .comp-table th.sorted.desc::after { content: ' ↓'; }
    .comp-table td { padding: 14px 18px; font-size: 12px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; font-variant-numeric: tabular-nums; }
    .comp-table tr:last-child td { border-bottom: none; }
    .comp-table tr:hover td { background: var(--navy-mid); cursor: pointer; }
    .comp-table .td-r { text-align: right; }
    .comp-table .td-name { font-weight: 700; font-size: 13px; }
    .comp-table .td-sub { font-size: 10px; color: var(--gray-400); margin-top: 2px; }
    .bar-inline { display: inline-flex; align-items: center; gap: 6px; }
    .bar-bg { background: var(--gray-100); border-radius: 3px; height: 6px; flex: 1; min-width: 60px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width .4s; }
    .bar-fill.amber { background: var(--amber); }
    .bar-fill.red   { background: var(--red); }

    /* CLIENT EXPAND LIST */
    .client-list { background: var(--navy-light); border-top: 0px solid var(--gray-100); padding: 0 24px; max-height: 0; overflow: hidden; transition: max-height .35s cubic-bezier(.4,0,.2,1), padding .35s cubic-bezier(.4,0,.2,1), border-top-width .1s; }
    .client-list.open { max-height: 2000px; padding: 16px 24px; border-top-width: 1px; }
    .client-list-item { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--gray-200); font-size: 11px; }
    .client-list-item:last-child { border-bottom: none; }
    .client-list-name { font-weight: 700; color: var(--navy); cursor: pointer; text-decoration: none; }
    .client-list-name:hover { color: var(--green); }
    .client-list-metrics { display: flex; gap: 16px; color: var(--gray-600); font-size: 10px; font-weight: 600; }

    /* TREND COMPARISON */
    .trend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 28px; }
    .trend-box { background: var(--bg); border-radius: var(--r); padding: 20px; border: 1px solid var(--gray-100); }
    .trend-box-label { font-size: 10px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 16px; }

    /* LOADING */
    .loading-state { text-align: center; padding: 80px 20px; }
    .spinner-lg { width: 36px; height: 36px; border: 3px solid var(--gray-100); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 16px; }
    .loading-text { font-size: 13px; color: var(--gray-400); font-weight: 600; }
    .muted { color: var(--gray-400); }
    @keyframes spin   { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <a class="btn-back" href="linkedin-dashboard.html">← Dashboard</a>
    <div class="header-pipe"></div>
    <div>
      <div class="header-title">Strategist Performance</div>
    </div>
  </div>
  <div class="header-right">
    <span id="last-updated"></span>
    <a href="https://docs.google.com/spreadsheets/d/1KI4t4JYPZNw5RbD2JTw7c4gdIhaV2fPZC9Y5RkGfGy4/edit" target="_blank" class="btn-refresh" style="text-decoration:none">↗ Hub Sheet</a>
    <button class="btn-refresh" onclick="load()">↻ Refresh</button>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">Period</span>
  <button class="btn-period" id="p-2w"  onclick="setPeriod('2w')">2W</button>
  <button class="btn-period" id="p-1m"  onclick="setPeriod('1m')">1M</button>
  <button class="btn-period" id="p-3m"  onclick="setPeriod('3m')">3M</button>
  <button class="btn-period active" id="p-all" onclick="setPeriod('all')">All Time</button>
  <div class="filter-spacer"></div>
  <span class="sort-label">View</span>
  <select class="sort-select" id="view-select" onchange="setView(this.value)">
    <option value="cards">Cards</option>
    <option value="table">Table</option>
  </select>
  <span class="sort-label" style="margin-left:8px">Sort by</span>
  <select class="sort-select" id="sort-select" onchange="renderAll()">
    <option value="meetings">Meetings</option>
    <option value="connections">Connections</option>
    <option value="acceptanceRate">Acceptance Rate</option>
    <option value="responseRate">Response Rate</option>
    <option value="clients">Client Count</option>
  </select>
</div>

<div class="main" id="main">
  <div class="loading-state">
    <div class="spinner-lg"></div>
    <div class="loading-text">Loading strategist data…</div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const DEFAULT_HUB_ID = '1KI4t4JYPZNw5RbD2JTw7c4gdIhaV2fPZC9Y5RkGfGy4';
const hubSheetId = localStorage.getItem('li-dash-hub-id') || DEFAULT_HUB_ID;
let activePeriod = 'all';
let currentView  = 'cards';
let sortKey      = 'meetings';
let sortDir      = 'desc';
let allClients   = [];

function hubCsvUrl() {
  return `https://docs.google.com/spreadsheets/d/${hubSheetId}/gviz/tq?tqx=out:csv&sheet=Output&tq=select%20*%20limit%2010000`;
}

// ── FETCH & PARSE ─────────────────────────────────────────────────────────────
async function load() {
  document.getElementById('main').innerHTML = `<div class="loading-state"><div class="spinner-lg"></div><div class="loading-text">Loading…</div></div>`;
  try {
    const res  = await fetch(hubCsvUrl());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    if (text.trim().startsWith('<')) throw new Error('Hub sheet is private — set to "Anyone with link can view"');
    const rows = Papa.parse(text, { skipEmptyLines: true }).data;
    if (rows.length < 2) throw new Error('Output tab is empty — run the Apps Script first');
    allClients = rows.slice(1).map(parseRow).filter(c => c.name);
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    renderAll();
  } catch(e) {
    document.getElementById('main').innerHTML = `<div class="loading-state"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div class="loading-text" style="color:var(--red)">${e.message}</div></div>`;
  }
}

function parseRow(r) {
  const pf = v => parseFloat(v) || 0;
  const parsePeriod = offset => ({
    connections: pf(r[offset]), messages: pf(r[offset+1]),
    acceptanceRate: pf(r[offset+2]), responses: pf(r[offset+3]),
    responseRate: pf(r[offset+4]), positive: pf(r[offset+5]),
    positiveResponseRate: pf(r[offset+6]), meetings: pf(r[offset+7]),
    positiveBookingRate: pf(r[offset+8]),
  });
  return {
    name:       (r[0]||'').trim(),
    strategist: (r[1]||'').trim(),
    cam:        (r[2]||'').trim(),
    startDate:  r[3]||'',
    endDate:    r[4]||'',
    status:     r[5]||'Active',
    sheetUrl:   r[6]||'',
    error:      (r[44]||'').trim(),
    periods: { '2w': parsePeriod(7), '1m': parsePeriod(16), '3m': parsePeriod(25), 'all': parsePeriod(34) }
  };
}

// ── GROUP BY STRATEGIST ───────────────────────────────────────────────────────
function groupByStrategist(clients, period) {
  const map = {};
  clients.forEach(c => {
    const key = c.strategist || '(Unassigned)';
    if (!map[key]) map[key] = { name: key, clients: [], active: 0, churned: 0 };
    map[key].clients.push(c);
    if (c.endDate) map[key].churned++; else map[key].active++;
  });

  return Object.values(map).map(s => {
    const active = s.clients.filter(c => !c.endDate);
    // Aggregate metrics for active clients only
    let totConn=0, totMsg=0, totResp=0, totPos=0, totMeet=0, withData=0;
    s.clients.forEach(c => {
      const d = c.periods[period] || c.periods['all'] || {};
      if (d.connections > 0 || d.meetings > 0) {
        totConn += d.connections; totMsg  += d.messages;
        totResp += d.responses;  totPos  += d.positive;
        totMeet += d.meetings;   withData++;
      }
    });

    // Period trends (2W vs 1M vs 3M vs All)
    const periodTotals = ['2w','1m','3m','all'].map(p => {
      let c=0, m=0, mt=0;
      s.clients.forEach(cl => { const d=cl.periods[p]||{}; c+=d.connections||0; m+=d.messages||0; mt+=d.meetings||0; });
      return { connections:c, messages:m, meetings:mt,
               acceptanceRate: c>0?m/c*100:0, responseRate: m>0?0:0 };
    });

    const accRate  = totConn > 0 ? totMsg  / totConn * 100 : 0;
    const respRate = totMsg  > 0 ? totResp / totMsg  * 100 : 0;
    const bookRate = totPos  > 0 ? totMeet / totPos  * 100 : 0;
    const posRate  = totResp > 0 ? totPos  / totResp * 100 : 0;

    // Client-level flags
    let atRisk = 0, topPerf = 0, noMeetings = 0;
    s.clients.filter(c => !c.endDate).forEach(c => {
      const d = c.periods['all'] || {};
      const d2w = c.periods['2w'] || {};
      const d1m = c.periods['1m'] || {};
      if (d.connections > 300 && d.meetings === 0) noMeetings++;
      if (d2w.connections < d1m.connections * 0.3 && d1m.connections > 30 && d2w.meetings === 0 && d1m.meetings > 1) atRisk++;
      if (d.acceptanceRate > 30 && d.responseRate > 25 && d.meetings >= 3) topPerf++;
    });

    return {
      name: s.name, clients: s.clients,
      activeCount: s.active, churnedCount: s.churned, totalCount: s.clients.length,
      connections: totConn, messages: totMsg, responses: totResp,
      positive: totPos, meetings: totMeet,
      acceptanceRate: accRate, responseRate: respRate,
      positiveBookingRate: bookRate, positiveResponseRate: posRate,
      atRisk, topPerf, noMeetings,
      periodTotals,
    };
  });
}

// ── PERIOD CONTROL ────────────────────────────────────────────────────────────
function setPeriod(p) {
  activePeriod = p;
  ['2w','1m','3m','all'].forEach(k => {
    document.getElementById('p-'+k).classList.toggle('active', k===p);
  });
  renderAll();
}

function setView(v) {
  currentView = v;
  renderAll();
}

// ── SORT ──────────────────────────────────────────────────────────────────────
function sortStrats(list) {
  const key = document.getElementById('sort-select').value;
  return [...list].sort((a, b) => {
    const av = key === 'clients' ? a.activeCount : (a[key] || 0);
    const bv = key === 'clients' ? b.activeCount : (b[key] || 0);
    return bv - av; // always desc for leaderboard
  });
}

// ── FORMAT HELPERS ────────────────────────────────────────────────────────────
function fn(v) { return v > 0 ? Math.round(v).toLocaleString() : '—'; }
function fp(v) { return v > 0 ? v.toFixed(1) + '%' : '—'; }
function pctChange(from, to) {
  if (!from) return '';
  const pct = ((to - from) / from) * 100;
  if (Math.abs(pct) < 1) return '';
  const cls  = pct > 0 ? 'color:var(--green)' : 'color:var(--red)';
  const sign = pct > 0 ? '↑' : '↓';
  return `<span style="${cls};font-size:10px;font-weight:700;margin-left:4px">${sign}${Math.abs(pct).toFixed(0)}%</span>`;
}

// ── RENDER MAIN ───────────────────────────────────────────────────────────────
function renderAll() {
  const strats = sortStrats(groupByStrategist(allClients, activePeriod));
  renderSummary(strats);
  if (currentView === 'cards') renderCards(strats);
  else renderTable(strats);
  renderTrendComparison(strats);
}

// ── SUMMARY BAR ───────────────────────────────────────────────────────────────
function renderSummary(strats) {
  const totalActive   = strats.reduce((a, s) => a + s.activeCount, 0);
  const totalMeetings = strats.reduce((a, s) => a + s.meetings, 0);
  const totalConn     = strats.reduce((a, s) => a + s.connections, 0);
  const totalMsg      = strats.reduce((a, s) => a + s.messages, 0);
  const topStrat      = strats[0];
  const avgAccRate    = totalConn > 0 ? (totalMsg / totalConn * 100).toFixed(1) + '%' : '—';

  document.getElementById('main').innerHTML = `
    <div class="summary-bar">
      <div class="summary-card"><div class="summary-value">${strats.length}</div><div class="summary-label">Strategists</div></div>
      <div class="summary-card"><div class="summary-value">${totalActive}</div><div class="summary-label">Active Clients</div></div>
      <div class="summary-card"><div class="summary-value">${fn(totalConn)}</div><div class="summary-label">Total Connections</div></div>
      <div class="summary-card"><div class="summary-value">${avgAccRate}</div><div class="summary-label">Avg Acceptance Rate</div></div>
      <div class="summary-card"><div class="summary-value">${fn(totalMeetings)}</div><div class="summary-label">Total Meetings</div></div>
    </div>
    <div id="strat-view"></div>
    <div id="trend-section"></div>`;
}

            <div class="strat-metric-val">${fn(s.responses)}</div>

function toggleClients(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

// ── TABLE VIEW ────────────────────────────────────────────────────────────────
function renderTable(strats) {
  const maxMeet = Math.max(...strats.map(s => s.meetings), 1);
  const maxConn = Math.max(...strats.map(s => s.connections), 1);
  const maxAcc  = Math.max(...strats.map(s => s.acceptanceRate), 1);

  const colorBar = (val, max, cls='') => {
    const pct = Math.min(100, Math.round(val / max * 100));
    return `<div class="bar-inline"><div class="bar-bg"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div></div>`;
  };

  const rows = strats.map((s, i) => {
    const flags = buildStratFlags(s);
    const flagHtml = flags.map(f => `<span class="badge badge-${f.t}">${f.s}</span>`).join(' ') || '—';
    return `<tr onclick="toggleClients('t-${i}')">
      <td>
        <div class="td-name">${i+1}. ${s.name}</div>
        <div class="td-sub">${s.activeCount} active · ${s.churnedCount} churned</div>
      </td>
      <td class="td-r">${fn(s.connections)}<br>${colorBar(s.connections, maxConn)}</td>
      <td class="td-r">${fp(s.acceptanceRate)}<br>${colorBar(s.acceptanceRate, maxAcc, s.acceptanceRate < 18 ? 'red' : s.acceptanceRate > 30 ? '' : 'amber')}</td>
      <td class="td-r">${fn(s.responses)}</td>
      <td class="td-r">${fp(s.responseRate)}</td>
      <td class="td-r" style="color:var(--green);font-weight:700">${fn(s.meetings)}<br>${colorBar(s.meetings, maxMeet)}</td>
      <td class="td-r">${fp(s.positiveBookingRate)}</td>
      <td>${flagHtml}</td>
    </tr>
    <tr><td colspan="8" style="padding:0">
      <div class="client-list" id="t-${i}" style="padding-left:30px">
        ${s.clients.map(c => {
          const d = c.periods[activePeriod] || c.periods['all'] || {};
          const badge = c.endDate ? '<span class="badge badge-bad">Churned</span>' : '<span class="badge badge-good">Active</span>';
          return `<div class="client-list-item">
            <div style="display:flex;align-items:center;gap:8px">
              <a class="client-list-name" href="client.html?id=hub_${allClients.indexOf(c)+1}&sheet=${encodeURIComponent(c.sheetUrl)}" onclick="event.stopPropagation()">${c.name}</a>
              ${badge}
            </div>
            <div class="client-list-metrics">
              <span>${fn(d.connections)} conn</span>
              <span>${fp(d.acceptanceRate)} acc</span>
              <span>${fp(d.responseRate)} resp</span>
              <span style="color:var(--green)">${fn(d.meetings)} mtg</span>
            </div>
          </div>`;
        }).join('')}

  document.getElementById('strat-view').innerHTML = `
    <div class="section" style="margin-bottom:20px">
      <div class="section-hdr">
        <span class="section-title">📊 Strategist Comparison</span>
        <span class="section-hint">Click a row to expand clients</span>
      </div>
      <div style="overflow-x:auto">
        <table class="comp-table">
          <thead><tr>
            <th>Strategist</th>
            <th class="td-r">Connections</th>
            <th class="td-r">Acc. Rate</th>
            <th class="td-r">Responses</th>
            <th class="td-r">Resp. Rate</th>
            <th class="td-r">Meetings</th>
            <th class="td-r">Booking Rate</th>
            <th>Flags</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

// ── TREND COMPARISON CHARTS ───────────────────────────────────────────────────
function renderTrendComparison(strats) {
  const pLabels = ['2W','1M','3M','All'];
  const colors  = ['#A8B4C4','#6B9AB8','#3b9fd4','#1EB683'];

  const makeChart = (title, valFn) => {
    // Multi-series bar chart: each strategist gets a set of 4 period bars
    const stratData = strats.slice(0, 6).map(s => ({
      name: s.name.split(' ')[0], // first name only for space
      vals: s.periodTotals.map(valFn),
    }));
    const allVals = stratData.flatMap(s => s.vals);
    const maxV = Math.max(...allVals, 1);

    const bW = 10, gap = 3, groupGap = 14;
    const groupW = 4 * (bW + gap) - gap;
    const W = stratData.length * (groupW + groupGap) - groupGap;
    const H = 70, padB = 28;

    const bars = stratData.map((s, gi) => {
      const gx = gi * (groupW + groupGap);
      const barsInGroup = s.vals.map((v, bi) => {
        const bh = Math.max(2, Math.round(v / maxV * H));
        const x  = gx + bi * (bW + gap);
        return `<rect x="${x}" y="${H-bh}" width="${bW}" height="${bh}" fill="${colors[bi]}" rx="2"/>`;
      }).join('');
      const labelX = gx + groupW / 2;
      return `${barsInGroup}<text x="${labelX}" y="${H+padB-4}" text-anchor="middle" font-size="8" fill="#8899a6" font-family="Montserrat,sans-serif" font-weight="600">${s.name}</text>`;
    }).join('');

    // Legend
    const legend = pLabels.map((l, i) =>
      `<span style="display:inline-flex;align-items:center;gap:4px;margin-right:12px;font-size:9px;color:var(--gray-600);font-weight:600"><span style="display:inline-block;width:8px;height:8px;background:${colors[i]};border-radius:2px"></span>${l}</span>`
    ).join('');

    return `
      <div class="trend-box">
        <div class="trend-box-label">${title}</div>
        <div style="margin-bottom:10px">${legend}</div>
        <svg width="${W}" height="${H+padB}" viewBox="0 0 ${W} ${H+padB}" style="overflow:visible;max-width:100%">${bars}</svg>
      </div>`;
  };

  const section = `
    <div class="section">
      <div class="section-hdr">
        <span class="section-title">📈 Period Trends by Strategist</span>
        <span class="section-hint">2W → 1M → 3M → All Time · Top 6 shown</span>
      </div>
      <div class="trend-grid">
        ${makeChart('Connections Sent', d => d.connections)}
        ${makeChart('Meetings Booked', d => d.meetings)}
        ${makeChart('Acceptance Rate', d => d.acceptanceRate)}
      </div>
    </div>`;

  document.getElementById('trend-section').innerHTML = section;
}

// ── FLAGS PER STRATEGIST ──────────────────────────────────────────────────────
// Uses rolling window logic:
// prior2W totals = 1M totals - 2W totals (the 2 weeks before the most recent 2 weeks)
function buildStratFlags(s) {
  const flags = [];
  const pt = s.periodTotals; // [2w, 1m, 3m, all]
  const p2w = pt[0], p1m = pt[1], p3m = pt[2], pAll = pt[3];

  // prior2W = 1M - 2W: activity in the 2 weeks before the most recent 2 weeks
  const prior2WConn = Math.max(0, p1m.connections - p2w.connections);
  const prior2WMeet = Math.max(0, p1m.meetings    - p2w.meetings);
  // priorMonthRate = (3M - 1M) / 2: avg monthly pace from months 2-3
  const priorMonthlyConn = p3m.connections > p1m.connections ? (p3m.connections - p1m.connections) / 2 : 0;

  // Top performer (use all-time rates)
  if (s.acceptanceRate > 30 && s.responseRate > 20 && s.meetings > 5)
    flags.push({t:'good', s:'⭐ Top performer'});

  // Churn risk clients
  if (s.atRisk >= 2)      flags.push({t:'bad',  s:`🚨 ${s.atRisk} at risk`});
  else if (s.atRisk === 1) flags.push({t:'warn', s:'⚠️ 1 at risk'});

  // Outreach momentum: compare most recent 2W to prior 2W across all clients
  if (prior2WConn > 20 && p2w.connections < prior2WConn * 0.5)
    flags.push({t:'warn', s:'📉 Outreach slowing'});
  else if (prior2WConn > 10 && p2w.connections > prior2WConn * 1.4)
    flags.push({t:'good', s:'🚀 Outreach up'});

  // Meeting momentum: had meetings in prior 2W but not recent 2W
  if (prior2WMeet > 0 && p2w.meetings === 0)
    flags.push({t:'warn', s:'⏸️ Meetings stalled'});
  else if (p2w.meetings > 0)
    flags.push({t:'good', s:`📅 ${p2w.meetings} mtg this 2W`});

  // No meetings clients
  if (s.noMeetings > 0)
    flags.push({t:'warn', s:`${s.noMeetings} with no mtgs`});

  // Low acceptance
  if (s.acceptanceRate < 18 && s.connections > 100)
    flags.push({t:'warn', s:'Low acc. rate'});

  if (s.topPerf >= 3)
    flags.push({t:'good', s:`${s.topPerf} top clients`});

  return flags.slice(0, 3);
}
