  <script>
    (function() {
      const path = window.location.pathname.replace(/^\/|\/$/g, '');
      const skip = ['index.html', 'client.html', 'strategist.html', '404.html', ''];
      if (path && !skip.includes(path) && !path.includes('.')) {
        window.location.replace('/client.html?client=' + encodeURIComponent(path));
      } else {
        window.location.replace('/');
      }
    })();
  </script>
