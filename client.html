<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Detail — Uptown Creation</title>
  <link rel="icon" type="image/png" href="https://cdn.prod.website-files.com/64ecf9fb0fb216ac640ea64a/652e9dbbc7a19b06feb5076f_UN_Favicon.png">
  <link rel="apple-touch-icon" href="https://cdn.prod.website-files.com/64ecf9fb0fb216ac640ea64a/652e9dc001944cd6099aaaec_UN_Webclip.png">
  <meta property="og:title" content="Client Dashboard — Uptown Creation">
  <meta property="og:description" content="Your LinkedIn outreach analytics, powered by Uptown Creation.">
  <meta property="og:image" content="https://cdn.prod.website-files.com/64ecf9fb0fb216ac640ea64a/652e9dc001944cd6099aaaec_UN_Webclip.png">
  <meta property="og:url" content="https://app.uptown.com/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --navy: #013A52; --navy-dark: #012a3d; --navy-light: #edf3f6; --navy-mid: rgba(1,58,82,.06);
      --green: #1EB683; --green-500: #1EB683; --green-dark: #18a374; --green-light: #e4f7f0; --green-glow: rgba(30,182,131,.15);
      --gray-mid: #A8B4C4;
      --white: #ffffff; --bg: #f4f6f8;
      --surface-1: #ffffff;
      --surface-2: #f7f9fb;
      --border: rgba(1,58,82,.08);
      --gray-100: #e8ecef; --gray-200: #d4dade; --gray-400: #8899a6; --gray-600: #4d5f6b;
      --red: #e53e3e; --red-light: #fff0f0;
      --amber: #f59e0b; --amber-light: #fef3c7;
      --r: 12px; --r-lg: 18px; --r-pill: 999px;
      --shadow-xs: 0 1px 4px rgba(1,58,82,.05), 0 0 0 1px rgba(1,58,82,.04);
      --shadow-sm: 0 2px 12px rgba(1,58,82,.08);
      --shadow-md: 0 8px 32px rgba(1,58,82,.10);
      --shadow-lg: 0 24px 64px rgba(1,58,82,.16);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', 'Montserrat', sans-serif; background: var(--bg); color: var(--navy); min-height: 100vh; -webkit-font-smoothing: antialiased; line-height: 1.5; }
    h1, h2, h3, h4, h5, h6 { font-family: 'Montserrat', sans-serif; line-height: 1.2; }
    :focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }
    button:focus-visible, a:focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    /* HEADER */
    .header { background: rgba(1,58,82,.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 0 rgba(255,255,255,.06), var(--shadow-md); }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .btn-back { display: flex; align-items: center; gap: 7px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.14); color: rgba(255,255,255,.8); padding: 7px 14px; border-radius: var(--r-pill); cursor: pointer; font-size: 11px; font-family: 'Montserrat', sans-serif; font-weight: 600; text-decoration: none; transition: all .2s; letter-spacing: .05em; text-transform: uppercase; }
    .btn-back:hover { background: rgba(255,255,255,.16); color: #fff; }
    .header-pipe { width: 1px; height: 28px; background: rgba(255,255,255,.12); }
    .client-header-name { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: .02em; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .btn-refresh { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.14); color: rgba(255,255,255,.7); padding: 7px 16px; border-radius: var(--r-pill); cursor: pointer; font-size: 11px; font-family: 'Montserrat', sans-serif; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: all .2s; letter-spacing: .05em; text-transform: uppercase; }
    .btn-refresh:hover { background: var(--green); border-color: var(--green); color: #fff; }
    #last-updated { font-size: 11px; color: rgba(168,180,196,.7); }

    /* MAIN */
    .main { max-width: 1440px; margin: 0 auto; padding: 28px 40px 60px; }

    /* META BAR */
    .meta-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    .meta-chips-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .meta-link-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .sheet-meta-link { font-size: 12px; font-weight: 700; color: #00b4d8; text-decoration: none; border: 1px solid #00b4d8; border-radius: 6px; padding: 5px 12px; white-space: nowrap; transition: background 0.15s; }
    .sheet-meta-link:hover { background: rgba(0,180,216,0.1); }
    .btn-short { display: none; }
    .btn-full  { display: inline; }
    .meta-chip { display: flex; flex-direction: column; background: var(--surface-1); border-radius: var(--r); padding: 10px 16px; box-shadow: var(--shadow-xs); border: 1px solid var(--border); min-width: 110px; transition: box-shadow .2s, transform .2s; animation: fadeUp .4s ease both; }
    .meta-chip:hover { box-shadow: var(--shadow-sm); transform: translateY(-1px); }
    .meta-chip-label { font-size: 9px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 3px; }
    .meta-chip-value { font-size: 13px; font-weight: 700; color: var(--navy); }
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: var(--r-pill); font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
    .badge-green { background: var(--green-light); color: var(--green-dark); }
    .badge-red { background: var(--red-light); color: var(--red); }

    /* SECTION */
    .section { background: var(--surface-1); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); border: 1px solid var(--border); margin-bottom: 24px; overflow: hidden; animation: fadeUp .45s ease both; }
    .section:nth-child(1) { animation-delay:  0ms; }
    .section:nth-child(2) { animation-delay: 80ms; }
    .section:nth-child(3) { animation-delay:160ms; }
    .section:nth-child(4) { animation-delay:240ms; }
    .section-hdr { padding: 16px 22px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; }
    .section-title { font-size: 10px; font-weight: 800; color: var(--navy); text-transform: uppercase; letter-spacing: .1em; }
    .section-body { padding: 20px 22px; }

    /* PERIOD COMPARISON TABLE */
    .period-table { width: 100%; border-collapse: collapse; }
    .period-table th { background: var(--navy); color: #fff; font-size: 10px; font-weight: 700; text-align: center; padding: 10px 14px; letter-spacing: .06em; text-transform: uppercase; }
    .period-table th:first-child { text-align: left; background: var(--bg); color: var(--gray-400); border-radius: 0; position: sticky; left: 0; z-index: 2; }
    .period-table td { padding: 10px 14px; font-size: 13px; text-align: center; border-bottom: 1px solid var(--gray-100); font-variant-numeric: tabular-nums; }
    .period-table td:first-child { text-align: left; font-weight: 600; color: var(--navy); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; position: sticky; left: 0; background: var(--surface-1); z-index: 1; }
    .period-table tr:last-child td { border-bottom: none; }
    .period-table tr { transition: background .15s; }
    .period-table tr:hover td { background: var(--navy-mid); }
    .val-best { color: var(--green); font-weight: 800; }
    .val-low  { color: var(--red); }

    /* % CHANGE BADGE */
    .pct-change { display: inline-flex; align-items: center; gap: 2px; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: var(--r-pill); margin-left: 5px; }
    .pct-up   { background: var(--green-light); color: var(--green-dark); }
    .pct-down { background: var(--red-light); color: var(--red); }
    .pct-flat { background: var(--gray-100); color: var(--gray-400); }

    /* TREND CHARTS GRID */
    .trend-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .trend-box { background: var(--bg); border-radius: var(--r); padding: 16px; border: 1px solid var(--gray-100); transition: box-shadow .2s, transform .2s; }
    .trend-box:hover { box-shadow: var(--shadow-sm); transform: translateY(-2px); background: var(--white); }
    .trend-box-label { font-size: 10px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }
    .trend-box-main { font-size: 24px; font-weight: 800; color: var(--navy); line-height: 1; margin-bottom: 4px; }
    .trend-box-sub { font-size: 11px; color: var(--gray-400); font-weight: 500; margin-bottom: 12px; }

    /* INSIGHTS */
    .insight-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border-radius: var(--r); margin-bottom: 8px; border: 1px solid transparent; border-left: 3px solid transparent; transition: transform .15s; }
    .insight-item:hover { transform: translateX(2px); }
    .insight-item:last-child { margin-bottom: 0; }
    .insight-item.good { background: var(--green-light); border-color: rgba(30,182,131,.15); border-left-color: var(--green); }
    .insight-item.warn { background: var(--amber-light); border-color: rgba(245,158,11,.15); border-left-color: var(--amber); }
    .insight-item.bad  { background: var(--red-light); border-color: rgba(229,62,62,.12); border-left-color: var(--red); }
    .insight-icon { font-size: 18px; line-height: 1; margin-top: 1px; flex-shrink: 0; }
    .insight-title { font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 2px; }
    .insight-desc  { font-size: 11px; color: var(--gray-600); font-weight: 500; line-height: 1.5; }

    /* LOADING / ERROR */
    .loading-state { text-align: center; padding: 80px 20px; }
    .spinner-lg { width: 36px; height: 36px; border: 3px solid var(--gray-100); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 16px; }
    .loading-text { font-size: 13px; color: var(--gray-400); font-weight: 600; }
    .error-state { text-align: center; padding: 80px 20px; }
    .error-icon { font-size: 36px; margin-bottom: 12px; }
    .error-msg { font-size: 13px; color: var(--red); font-weight: 600; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .muted { color: var(--gray-400); }

    /* SUMMARY VALUE TYPOGRAPHY */
    .trend-box-main { font-variant-numeric: tabular-nums; font-family: 'Montserrat', sans-serif; }

    @media (max-width: 768px) {
      .header { padding: 0 16px; height: 56px; }
      .header-pipe { display: none; }
      .client-header-name { font-size: 14px; }
      #last-updated { display: none; }
      .btn-refresh { padding: 6px 10px; font-size: 10px; }
      .btn-label-full { display: none; }
      .btn-label-icon { display: inline !important; }
      .main { padding: 14px 14px 48px; }
      .meta-bar { flex-direction: column; align-items: stretch; gap: 10px; }
      .meta-chips-left { gap: 8px; flex-wrap: wrap; }
      .meta-chip { min-width: 90px; padding: 8px 12px; }
      .meta-link-row { width: 100%; }
      .sheet-meta-link { flex: 1; text-align: center; padding: 8px 4px; }
      .btn-full  { display: none; }
      .btn-short { display: inline; }
      .section { margin-bottom: 16px; }
      .section-hdr { padding: 12px 16px; flex-wrap: wrap; gap: 4px; }
      .section-hdr > span:last-child { display: none; }
      .section-body { padding: 12px 14px; overflow-x: auto; }
      .period-table { min-width: 440px; }
      .period-table th, .period-table td { padding: 8px 10px; font-size: 11px; }
      .pct-change { padding: 1px 4px; font-size: 9px; margin-left: 3px; }
      .trend-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .trend-box { padding: 12px; }
      .trend-box-main { font-size: 20px; }
      .trend-box svg { width: 100% !important; height: auto; display: block; overflow: visible; }
      .insight-item { padding: 10px 12px; gap: 10px; }
      .insight-desc { font-size: 11px; }
    }
    @media (max-width: 480px) {
      .client-header-name { font-size: 13px; }
      .main { padding: 10px 10px 40px; }
      .meta-chips-left { display: grid; grid-template-columns: 1fr 1fr; }
      .meta-chip { min-width: unset; }
      .section-hdr { padding: 10px 12px; }
      .section-body { padding: 10px 12px; }
      .trend-grid { grid-template-columns: 1fr 1fr; }
      .trend-box-main { font-size: 16px; }
      .trend-box-sub { font-size: 10px; }
      .insight-icon { font-size: 15px; }
      .insight-title { font-size: 11px; }
    }
    /* DAILY CHART */
    .daily-section { background: var(--surface-1); border-radius: var(--r-lg); box-shadow: var(--shadow-xs); border: 1px solid var(--border); margin-bottom: 20px; overflow: hidden; animation: fadeUp .5s ease both; animation-delay: .1s; }
    .daily-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 16px 22px 0; }
    .daily-period-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .daily-pill { background: var(--navy-mid); border: 1px solid var(--border); border-radius: var(--r-pill); padding: 5px 13px; font-size: 11px; font-weight: 700; font-family: 'Montserrat', sans-serif; color: var(--gray-600); cursor: pointer; transition: all .18s; letter-spacing: .04em; }
    .daily-pill.active { background: var(--navy); border-color: var(--navy); color: #fff; }
    .daily-pill:hover:not(.active) { border-color: var(--navy); color: var(--navy); }
    .daily-metric-toggles { display: flex; gap: 8px; flex-wrap: wrap; }
    .daily-toggle { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 11px; font-weight: 600; font-family: 'Montserrat', sans-serif; color: var(--gray-600); user-select: none; }
    .daily-toggle input { accent-color: var(--green); width: 13px; height: 13px; cursor: pointer; }
    .daily-chart-wrap { padding: 12px 22px 20px; position: relative; }
    .daily-chart-wrap canvas { max-height: 260px; }
    .daily-empty { text-align: center; padding: 48px 24px; color: var(--gray-400); font-size: 13px; font-weight: 600; }
    .daily-loading { text-align: center; padding: 36px 24px; color: var(--gray-400); font-size: 12px; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <img src="https://cdn.prod.website-files.com/64ecf9fb0fb216ac640ea64a/64f90db4332a673644c7105b_Logo-White.png" alt="Uptown Creation" style="height:32px;width:auto;object-fit:contain;display:block">
    <div class="header-pipe"></div>
    <span class="client-header-name" id="header-name">Loading…</span>
  </div>
  <div class="header-right">
    <span id="last-updated"></span>
    <button class="btn-refresh" onclick="loadClient()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg><span class="btn-label-full">Refresh</span></button>
  </div>
</header>

<div class="main" id="main">
  <div class="loading-state">
    <div class="spinner-lg"></div>
    <div class="loading-text">Loading client data…</div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const DEFAULT_HUB_ID = '1KI4t4JYPZNw5RbD2JTw7c4gdIhaV2fPZC9Y5RkGfGy4';
const hubSheetId = localStorage.getItem('li-dash-hub-id') || DEFAULT_HUB_ID;

// ── URL PARAMS ────────────────────────────────────────────────────────────────
const urlParams   = new URLSearchParams(window.location.search);
const clientSlug  = urlParams.get('client') || '';
const clientId    = urlParams.get('id') || '';
const sheetParam  = urlParams.get('sheet') || '';

function fmtDate(d) {
  if (!d) return '';
  const m = d.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return `${m[2]}/${m[3]}/${m[1]}`;
  return d;
}

function toSlug(name, company) {
  return [name, company].filter(Boolean).join(' ')
    .toLowerCase().replace(/[^a-z0-9\s]/g, '').trim().replace(/\s+/g, '-');
}


// hub_5 → row index 5 in the CSV (1-based after header)
function getRowIndex(id) {
  const m = id.match(/^hub_(\d+)$/);
  return m ? parseInt(m[1]) : -1;
}

// ── FETCH ─────────────────────────────────────────────────────────────────────
function hubCsvUrl() {
  return `https://docs.google.com/spreadsheets/d/${hubSheetId}/gviz/tq?tqx=out:csv&sheet=Output&tq=select%20*%20limit%2010000`;
}

async function loadClient() {
  renderLoading();
  try {
    const res = await fetch(hubCsvUrl());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    if (text.trim().startsWith('<')) throw new Error('Hub sheet is private — set to "Anyone with link can view"');
    const rows = Papa.parse(text, { skipEmptyLines: true }).data;
    if (rows.length < 2) throw new Error('Output tab is empty — run the Apps Script first');

    let r;
    if (clientSlug) {
      r = rows.slice(1).find(row => toSlug((row[0]||'').trim(), (row[7]||'').trim()) === clientSlug);
      if (!r) throw new Error('Client not found — the link may be outdated');
    } else {
      const rowIndex = getRowIndex(clientId);
      if (rowIndex < 1 || rowIndex >= rows.length) throw new Error('Client not found — try refreshing the dashboard first');
      r = rows[rowIndex];
    }
    const client = parseRow(r);
    if (client.password) {
      const authKey = `client-auth-${clientSlug || clientId}`;
      if (localStorage.getItem(authKey) !== 'ok') {
        renderPasswordGate(client, authKey);
        return;
      }
    }
    renderPage(client);
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    // Restore clean URL (e.g. /august-tesfasilase-dialup-media)
    if (clientSlug && window.location.pathname !== '/' + clientSlug) {
      history.replaceState(null, '', '/' + clientSlug);
    }
  } catch(e) {
    renderError(e.message);
  }
}

// ── PARSE ROW ─────────────────────────────────────────────────────────────────
// Cols: 0-5 base, 6-14 2W, 15-23 1M, 24-32 3M, 33-41 All, 42 updated, 43 error
function parseRow(r) {
  const pf = v => parseFloat(v) || 0;
  // Col 6 = Sheet URL, metrics start at col 7 now
  const parsePeriod = offset => ({
    connections:          pf(r[offset]),
    messages:             pf(r[offset+1]),
    acceptanceRate:       pf(r[offset+2]),
    responses:            pf(r[offset+3]),
    responseRate:         pf(r[offset+4]),
    positive:             pf(r[offset+5]),
    positiveResponseRate: pf(r[offset+6]),
    meetings:             pf(r[offset+7]),
    positiveBookingRate:  pf(r[offset+8]),
  });
  return {
    name:        (r[0]||'').trim(),
    strategist:  r[1]||'',
    cam:         r[2]||'',
    startDate:   r[3]||'',
    endDate:     r[4]||'',
    status:      r[5]||'Active',
    sheetUrl:    r[6]||'',
    companyName:  r[7]||'',
    service:      r[8]||'',
    messagingUrl: r[9]||'',
    contentUrl:   r[10]||'',
    lastUpdated:  r[74]||'',
    error:       (r[75]||'').trim(),
    get password() {
      return ((this.companyName || '') + fmtDate(this.startDate || '')).toLowerCase().replace(/[^a-z0-9]/g, '');
    },
    periods: {
      '1w':  parsePeriod(11), '2w':  parsePeriod(20), '3w':  parsePeriod(29),
      '1m':  parsePeriod(38), '2m':  parsePeriod(47), '3m':  parsePeriod(56),
      'all': parsePeriod(65),
    }
  };
}

// ── RENDER: LOADING / ERROR ───────────────────────────────────────────────────
function renderLoading() {
  document.getElementById('main').innerHTML = `
    <div class="loading-state">
      <div class="spinner-lg"></div>
      <div class="loading-text">Loading client data…</div>
    </div>`;
  document.getElementById('header-name').textContent = 'Loading…';
}

const NOT_FOUND_ERRORS = ['Client not found', 'No client ID'];

function renderError(msg) {
  const isNotFound = NOT_FOUND_ERRORS.some(e => msg.includes(e));
  const body = isNotFound
    ? `<div class="error-icon">🔗</div>
       <div class="error-msg" style="font-size:15px;font-weight:700;margin-bottom:8px">This link is no longer valid</div>
       <div style="font-size:13px;color:var(--gray-600);max-width:360px;line-height:1.6;margin:0 auto">It looks like this client page has moved or the link has expired. Please contact your account admin for an updated link.</div>`
    : `<div class="error-icon">⚠️</div>
       <div class="error-msg">${msg}</div>`;
  document.getElementById('main').innerHTML = `<div class="error-state">${body}</div>`;
  document.getElementById('header-name').textContent = isNotFound ? 'Link Expired' : 'Error';
}

// ── PASSWORD GATE ─────────────────────────────────────────────────────────────
function renderPasswordGate(client, authKey) {
  document.getElementById('header-name').textContent = client.name || 'Dashboard';
  document.getElementById('main').innerHTML = `
    <div class="error-state" style="padding-top:100px">
      <div style="background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(1,58,82,.12);padding:40px 36px;max-width:480px;margin:0 auto;text-align:center">
        <div style="font-size:28px;margin-bottom:12px">🔒</div>

function checkClientPw(authKey, correctPw) {
  const input = document.getElementById('pw-input');
  const errEl = document.getElementById('pw-error');
  if (input.value === correctPw) {
    localStorage.setItem(authKey, 'ok');
    document.getElementById('main').innerHTML = `<div class="loading-state"><div class="spinner-lg"></div><div class="loading-text">Loading…</div></div>`;
    loadClient();
  } else {
    errEl.textContent = 'Incorrect password. Please try again.';
    input.value = '';
    input.style.borderColor = 'var(--red)';
    setTimeout(() => { input.style.borderColor = 'var(--gray-100)'; errEl.textContent = ''; }, 1400);
    input.focus();
  }
}

// ── PERIOD COMPARISON TABLE ───────────────────────────────────────────────────
const METRIC_DEFS = [
  { key:'connections',          label:'Connections Sent',    isRate:false },
  { key:'messages',             label:'Messages Sent',       isRate:false },
  { key:'acceptanceRate',       label:'Acceptance Rate',     isRate:true  },
  { key:'responses',            label:'Responses',           isRate:false },
  { key:'responseRate',         label:'Response Rate',       isRate:true  },
  { key:'positive',             label:'Positive Responses',  isRate:false },
  { key:'positiveResponseRate', label:'Pos. Response Rate',  isRate:true  },
  { key:'meetings',             label:'Meetings Booked',     isRate:false },
  { key:'positiveBookingRate',  label:'Booking Rate',        isRate:true  },
];
const P_KEYS   = ['1w','2w','3w','1m','2m','3m','all'];
const P_LABELS = { '1w':'1 Week','2w':'2 Weeks','3w':'3 Weeks','1m':'1 Month','2m':'2 Months','3m':'3 Months','all':'All Time' };

function fmtVal(v, isRate) {
  if (!v || v === 0) return '<span class="muted">—</span>';
  return isRate ? v.toFixed(1) + '%' : Math.round(v).toLocaleString();
}

// Returns a formatted % change string like "↑12%" or "↓5%" or "" if not meaningful
function pctChange(from, to) {
  if (!from || from === 0) return '';
  const pct = ((to - from) / from) * 100;
  if (Math.abs(pct) < 2) return '';
  return pct > 0 ? `↑${Math.round(pct)}%` : `↓${Math.abs(Math.round(pct))}%`;
}

// Rolling window % change badge
// Periods are rolling windows: 2W ⊆ 1M ⊆ 3M ⊆ All
// prior2W  = 1M - 2W  (the 2 weeks before the most recent 2 weeks)
// priorMo  = (3M - 1M) / 2  (monthly pace for months 2-3, before most recent month)
function rollingBadge(pct) {
  if (pct === null || Math.abs(pct) < 2) return '<span class="pct-change pct-flat">→</span>';
  const cls  = pct > 0 ? 'pct-up' : 'pct-down';
  const sign = pct > 0 ? '↑' : '↓';
  return `<span class="pct-change ${cls}">${sign}${Math.abs(pct).toFixed(0)}%</span>`;
}

function renderPeriodTable(periods) {
  const pVals = {};
  P_KEYS.forEach(k => pVals[k] = periods[k] || {});

  const rows = METRIC_DEFS.map(m => {
    const vals = P_KEYS.map(k => pVals[k][m.key] || 0);
    const maxV = Math.max(...vals);

    // Compute badges: compare each period to the next longer one
    const badges = P_KEYS.map((k, i) => {
      if (i >= P_KEYS.length - 1) return ''; // no badge for All Time
      const cur = vals[i], next = vals[i + 1];
      if (m.isRate) {
        return next > 0 ? rollingBadge(((cur - next) / next) * 100) : '';
      } else {
        // For counts, compare against prior equivalent window
        const prior = next - cur;
        return prior > 0 ? rollingBadge(((cur - prior) / prior) * 100) : '';
      }
    });

    const bestCls = (v) => v === maxV && v > 0 ? 'val-best' : '';
    return `<tr>
      <td>${m.label}</td>
      ${vals.map((v, i) => `<td class="${bestCls(v)}">${fmtVal(v, m.isRate)}${badges[i]}</td>`).join('')}
    </tr>`;
  }).join('');

  return `
    <div class="section">
      <div class="section-hdr">
        <span class="section-title">Period Comparison</span>
        <span style="font-size:10px;color:var(--gray-400);font-weight:600">Rolling windows · ↑↓ on counts = vs prior equivalent window · ↑↓ on rates = vs longer window avg</span>
      </div>
      <div style="overflow-x:auto">
        <table class="period-table">
          <thead><tr>
            <th>Metric</th>
            ${P_KEYS.map(k=>`<th>${P_LABELS[k]}</th>`).join('')}
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

// ── ICON SVGs (replaces emoji for cross-platform consistency) ─────────────────
function iconSvg(key) {

    good:  `<svg ${a} stroke="#1EB683" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M5 8l2 2.5 4-4"/></svg>`,
    star:  `<svg ${a} stroke="#d97706" stroke-width="1.5"><path d="M8 2l1.6 3.3 3.6.5-2.6 2.5.6 3.6L8 10.1l-3.2 1.8.6-3.6-2.6-2.5 3.6-.5z"/></svg>`,
    up:    `<svg ${a} stroke="#1EB683" stroke-width="1.5"><path d="M8 13V3M3.5 7.5 8 3l4.5 4.5"/></svg>`,
    down:  `<svg ${a} stroke="#d97706" stroke-width="1.5"><path d="M8 3v10M3.5 8.5 8 13l4.5-4.5"/></svg>`,
    pause: `<svg ${a} stroke="#d97706" stroke-width="1.5"><rect x="4" y="3.5" width="2.5" height="9" rx="1"/><rect x="9.5" y="3.5" width="2.5" height="9" rx="1"/></svg>`,

// ── TREND BAR CHARTS ──────────────────────────────────────────────────────────
function barChartSVG(periods, key, isRate) {
  const vals   = P_KEYS.map(k => (periods[k] && periods[k][key]) || 0);
  const labels = P_KEYS.map(k => P_LABELS[k]);
  const max    = Math.max(...vals, 1);
  const bW = 38, gap = 10, H = 72, padB = 22;
  const W  = P_KEYS.length * (bW + gap) - gap;
  const colors = ['#cbd5e0','#A8B4C4','#8899a6','#6B9AB8','#3b9fd4','#013A52','#1EB683'];

  const bars = vals.map((v, i) => {
    const bh  = Math.max(3, Math.round(v / max * H));
    const x   = i * (bW + gap);
    const lbl = isRate ? (v > 0 ? v.toFixed(1)+'%' : '') : (v > 0 ? Math.round(v).toLocaleString() : '');
    const trend = i > 0 ? pctChange(vals[i-1], v) : '';
    return `
      <rect x="${x}" y="${H-bh}" width="${bW}" height="${bh}" fill="${colors[i]}" rx="3"/>
      <text x="${x+bW/2}" y="${H-bh-6}" text-anchor="middle" font-size="9" fill="${colors[i]}" font-family="Montserrat,sans-serif" font-weight="700">${lbl}</text>
      <text x="${x+bW/2}" y="${H+padB-4}" text-anchor="middle" font-size="9" fill="#8899a6" font-family="Montserrat,sans-serif" font-weight="600">${labels[i]}</text>`;
  }).join('');

  return `<svg width="100%" height="${H+padB}" viewBox="0 0 ${W} ${H+padB}" preserveAspectRatio="xMidYMid meet" style="overflow:visible;display:block">${bars}</svg>`;
}

const TREND_METRICS = [
  { key:'connections',          label:'Connections Sent',   isRate:false },
  { key:'messages',             label:'Messages Sent',      isRate:false },
  { key:'acceptanceRate',       label:'Acceptance Rate',    isRate:true  },
  { key:'responses',            label:'Responses',          isRate:false },
  { key:'responseRate',         label:'Response Rate',      isRate:true  },
  { key:'meetings',             label:'Meetings Booked',    isRate:false },
  { key:'positiveResponseRate', label:'Pos. Response Rate', isRate:true  },
  { key:'positiveBookingRate',  label:'Booking Rate',       isRate:true  },
];

function renderTrendCharts(periods) {
  const all = periods['all'] || {};
  const p2w = periods['2w'] || {};

  const boxes = TREND_METRICS.map(m => {
    const allVal = all[m.key] || 0;
    const w2Val  = p2w[m.key] || 0;
    const change = allVal ? pctChange(allVal, w2Val) : '';
    const mainFmt = m.isRate
      ? (allVal > 0 ? allVal.toFixed(1)+'%' : '—')
      : (allVal > 0 ? Math.round(allVal).toLocaleString() : '—');

    return `
      <div class="trend-box">
        <div class="trend-box-label">${m.label}</div>
        <div class="trend-box-main">${mainFmt}</div>
        <div class="trend-box-sub">All Time ${change ? '· 2W: '+change : ''}</div>
        ${barChartSVG(periods, m.key, m.isRate)}
      </div>`;
  }).join('');

  return `
    <div class="section">
      <div class="section-hdr">
        <span class="section-title">Trends by Period</span>
        <span style="font-size:10px;color:var(--gray-400);font-weight:600">1W → 2W → 3W → 1M → 2M → 3M → All Time</span>
      </div>
      <div class="section-body">
        <div class="trend-grid">${boxes}</div>
      </div>
    </div>`;
}

// ── INSIGHTS ──────────────────────────────────────────────────────────────────
// Rolling windows: 2W = last 2 weeks, 1M = last month (includes 2W), 3M = last 3 months (includes 1M)
// prior2W       = 1M - 2W        → activity in weeks 3-4 (the 2 weeks before most recent)
// priorMonthRate = (3M - 1M) / 2 → avg monthly activity from months 2-3
function buildInsights(periods) {
  const flags = [];
  const all = periods['all'] || {};
  const p2w = periods['2w'] || {};
  const p1m = periods['1m'] || {};
  const p3m = periods['3m'] || {};

  const add = (t, icon, title, desc) => flags.push({t, icon, title, desc});

  // Rolling window helpers
  const prior2W         = k => Math.max(0, (p1m[k]||0) - (p2w[k]||0));
  const priorMonthRate  = k => p3m[k] > p1m[k] ? ((p3m[k]||0) - (p1m[k]||0)) / 2 : 0;

  // ── Overall rate benchmarks (use All Time for stable sample) ─────────────
  if (all.connections > 100) {
    if (all.acceptanceRate < 14)
      add('bad',  'crit', 'Very low acceptance rate',     `${all.acceptanceRate.toFixed(1)}% all-time — well below 18% target. Profile or messaging needs review.`);
    else if (all.acceptanceRate < 18)
      add('warn', 'warn', 'Below-target acceptance rate',  `${all.acceptanceRate.toFixed(1)}% all-time — target is 18%+.`);
    else if (all.acceptanceRate > 35)
      add('good', 'star', 'Exceptional acceptance rate',   `${all.acceptanceRate.toFixed(1)}% — well above benchmark.`);
    else if (all.acceptanceRate > 28)
      add('good', 'good', 'Strong acceptance rate',         `${all.acceptanceRate.toFixed(1)}% — above 28% benchmark.`);
  }

  if (all.messages > 50) {
    if (all.responseRate < 10)
      add('bad',  'crit', 'Very low response rate',        `${all.responseRate.toFixed(1)}% — target is 15%+. Message copy needs a rewrite.`);
    else if (all.responseRate < 15)
      add('warn', 'warn', 'Below-target response rate',    `${all.responseRate.toFixed(1)}% — try personalizing the opening line or changing the CTA.`);
    else if (all.responseRate > 28)
      add('good', 'good', 'Strong response rate',           `${all.responseRate.toFixed(1)}% — top-tier engagement.`);
  }

  // ── Meetings ──────────────────────────────────────────────────────────────
  if (all.connections > 300 && all.meetings === 0)
    add('bad', 'crit', 'No meetings booked', `${all.connections.toLocaleString()} connections with zero meetings — escalate immediately.`);
  else if (all.meetings > 0) {
    if (all.positiveBookingRate > 60)
      add('good', 'star', 'Outstanding booking rate', `${all.positiveBookingRate.toFixed(1)}% of positives convert to meetings.`);
    else if (all.positiveBookingRate < 20 && all.positive > 10)
      add('warn', 'warn', 'Low booking rate', `Only ${all.positiveBookingRate.toFixed(1)}% of positives book — follow-up sequence may need work.`);
  }

  if (all.responses > 20 && all.positiveResponseRate < 25)
    add('warn', 'down', 'Low positive rate', `${all.positiveResponseRate.toFixed(1)}% of responses are positive — objection handling may need work.`);

  // ── Momentum: compare most recent 2W against the prior 2W ────────────────
  // prior2W = 1M - 2W (the 2 weeks immediately before the most recent 2 weeks)
  const prior2WConn = prior2W('connections');
  const prior2WMeet = prior2W('meetings');

  if (prior2WConn > 0) {
    const connPct = ((p2w.connections - prior2WConn) / prior2WConn) * 100;
    if (connPct < -30)
      add('warn', 'down', 'Outreach slowing down', `Most recent 2W (${p2w.connections} connections) is ${Math.abs(connPct).toFixed(0)}% below the prior 2 weeks (${Math.round(prior2WConn)}).`);
    else if (connPct > 30)
      add('good', 'up', 'Outreach accelerating', `Most recent 2W (${p2w.connections} connections) is ${connPct.toFixed(0)}% ahead of the prior 2 weeks (${Math.round(prior2WConn)}).`);
  }

  // Meetings momentum: compare most recent 2W meetings vs prior 2W meetings
  if (prior2WMeet > 0 && p2w.meetings === 0)
    add('warn', 'pause', 'Meetings stalled recently', `Had ${Math.round(prior2WMeet)} meeting(s) in the prior 2 weeks but none in the most recent 2 weeks.`);
  else if (p2w.meetings > 0 && prior2WMeet === 0 && p2w.meetings > 0)
    add('good', 'cal', 'Meetings picked up', `${p2w.meetings} meeting${p2w.meetings!==1?'s':''} in the most recent 2 weeks — up from 0 in the prior 2 weeks.`);
  else if (p2w.meetings > 0)
    add('good', 'cal', 'Active meetings recently', `${p2w.meetings} meeting${p2w.meetings!==1?'s':''} booked in the most recent 2 weeks.`);

  // ── Rate trend: 2W rate vs 1M rate (direct comparison valid for rates) ───
  if (p2w.connections > 20 && p1m.connections > 20) {
    if (p2w.acceptanceRate > p1m.acceptanceRate * 1.15)
      add('good', 'up', 'Acceptance rate improving', `Most recent 2W (${p2w.acceptanceRate.toFixed(1)}%) is beating the 1M average (${p1m.acceptanceRate.toFixed(1)}%).`);
    else if (p2w.acceptanceRate < p1m.acceptanceRate * 0.8)
      add('warn', 'down', 'Acceptance rate declining', `Most recent 2W (${p2w.acceptanceRate.toFixed(1)}%) is below the 1M average (${p1m.acceptanceRate.toFixed(1)}%) — may need targeting refresh.`);
  }

  // ── Monthly pace check: 1M vs prior monthly rate ─────────────────────────
  const priorMoConn = priorMonthRate('connections');
  if (priorMoConn > 0) {
    const moPct = ((p1m.connections - priorMoConn) / priorMoConn) * 100;
    if (moPct < -35)
      add('warn', 'down', 'Monthly outreach declining', `This month (${p1m.connections} connections) is ${Math.abs(moPct).toFixed(0)}% below the prior monthly pace (${Math.round(priorMoConn)}/mo).`);
    else if (moPct > 35)
      add('good', 'up', 'Monthly outreach growing', `This month (${p1m.connections} connections) is ${moPct.toFixed(0)}% above the prior monthly pace (${Math.round(priorMoConn)}/mo).`);
  }

  if (flags.length === 0)
    add('good', 'tip', 'Campaign looks healthy', 'No significant issues detected across any period.');

  return flags;
}

function renderInsights(periods) {
  const flags = buildInsights(periods);
  const items = flags.map(f => `
    <div class="insight-item ${f.t}">
      <span class="insight-icon">${iconSvg(f.icon)}</span>
      <div>
        <div class="insight-title">${f.title}</div>
        ${f.desc ? `<div class="insight-desc">${f.desc}</div>` : ''}
      </div>
    </div>`).join('');

  return `
    <div class="section">
      <div class="section-hdr">
        <span class="section-title">Insights & Flags</span>
        <span style="font-size:10px;color:var(--gray-400);font-weight:600">${flags.length} flag${flags.length!==1?'s':''} detected</span>
      </div>
      <div class="section-body">${items}</div>
    </div>`;
}

async function loadDailyChart(clientSheetId) {
  const el = document.getElementById('daily-chart-section');
  el.innerHTML = `
    <div class="daily-section">
      <div class="section-hdr" style="border-bottom:1px solid var(--border)">
        <span class="section-title">Daily Activity</span>
        <span style="font-size:10px;color:var(--gray-400);font-weight:600">Fetching from sheet…</span>
      </div>
      <div class="daily-loading">Loading daily data…</div>
    </div>`;

  try {
    const url = `https://docs.google.com/spreadsheets/d/${clientSheetId}/gviz/tq?tqx=out:csv&sheet=Data%20Tracking&tq=select%20*%20limit%2010000`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    if (text.trim().startsWith('<')) throw new Error('Sheet not public');

    const rows = Papa.parse(text, { skipEmptyLines: true }).data;
    _dailyAllData = parseDailyRows(rows);

    if (!_dailyAllData || _dailyAllData.dates.length < 3) {
      el.innerHTML = '';
      return; // No daily data — hide section silently
    }

    renderCumulativeSection(el);
    buildCumulativeChart();
    renderDailySection(document.getElementById('daily-chart-below'));
    buildDailyChart();
  } catch(e) {
    el.innerHTML = ''; // Hide on error — don't disrupt main content
  }
}

function parseDailyRows(rows) {
  if (!rows || rows.length < 2) return null;
  const header = rows[0];

  // Find columns with date-like headers
  const dateCols = [];
  const today = new Date(); today.setHours(0,0,0,0);
  const tenYearsAgo = new Date(today); tenYearsAgo.setFullYear(today.getFullYear() - 10);
  const tomorrow    = new Date(today); tomorrow.setDate(today.getDate() + 1);

  for (let c = 1; c < header.length; c++) {
    const v = header[c]; if (!v) continue;
    const d = new Date(v);
    if (!isNaN(d.getTime()) && d >= tenYearsAgo && d <= tomorrow) {
      dateCols.push({ col: c, date: new Date(d.setHours(0,0,0,0)) });
    }
  }
  if (dateCols.length < 3) return null;

  // Find metric rows
  const findRow = (kw, ex) => rows.find(r => {
    const l = String(r[0]||'').toLowerCase().trim();
    return l.includes(kw) && !(ex||[]).some(x => l.includes(x));
  });
  const connRow = findRow('connection request');
  const msgRow  = findRow('initial message');
  const respRow = findRow('linkedin response', ['rate']);
  const meetRow = findRow('meeting', ['rate']);
  if (!connRow && !msgRow) return null;

  const gv = (row, col) => row ? (parseFloat(String(row[col]||'').replace(/[%,$\s,]/g,'')) || 0) : 0;

  // Sort by date ascending
  dateCols.sort((a,b) => a.date - b.date);

  const posRow  = rows.find(r => { const l = String(r[0]||'').toLowerCase().trim(); return l === 'positive' || l === 'positive responses'; });

  const series = { connections:[], messages:[], responses:[], positive:[], meetings:[] };
  const dates  = [];
  for (const { col, date } of dateCols) {
    dates.push(date);
    series.connections.push(gv(connRow, col));
    series.messages.push(gv(msgRow, col));
    series.responses.push(gv(respRow, col));
    series.positive.push(gv(posRow, col));
    series.meetings.push(gv(meetRow, col));
  }
  return { dates, series };
}

function renderCumulativeSection(el) {
  const pills = [
    { label:'1W',  days:7 },
    { label:'2W',  days:14 },
    { label:'3W',  days:21 },
    { label:'1M',  days:30 },

    { label:'1Y',  days:365 },

  ].map(p => `<button class="daily-pill cum-pill${_cumDays===p.days?' active':''}" onclick="setCumPeriod(${p.days})">${p.label}</button>`).join('');

  const toggles = DAILY_METRIC_OPTS.map(m =>

      <input type="checkbox" value="${m.key}" ${_cumMetrics.includes(m.key)?'checked':''}

    </label>`).join('');

  el.innerHTML = `
    <div class="daily-section">
      <div class="section-hdr" style="border-bottom:1px solid var(--border)">

      </div>

        <div class="daily-period-pills">${pills}</div>

      <div class="daily-chart-wrap"><canvas id="cum-canvas"></canvas></div>
    </div>`;
}

function buildCumulativeChart() {
  const { dates, series } = _dailyAllData;
  const cutoff = _cumDays > 0 ? new Date(Date.now() - _cumDays * 86400000) : new Date(0);

  const filtered = dates.reduce((acc, d, i) => {
    if (d >= cutoff) {
      acc.labels.push(d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+', \''+String(d.getFullYear()).slice(2));
      DAILY_METRIC_OPTS.forEach(m => acc.data[m.key].push(series[m.key][i]));
    }
    return acc;
  }, { labels:[], data:{connections:[],messages:[],responses:[],positive:[],meetings:[]} });

  // Convert to cumulative
  const cumData = {};
  DAILY_METRIC_OPTS.forEach(m => {
    let sum = 0;
    cumData[m.key] = filtered.data[m.key].map(v => { sum += v; return sum; });
  });

  const datasets = DAILY_METRIC_OPTS
    .filter(m => _cumMetrics.includes(m.key))
    .map(m => ({
      label: m.label,
      data:  cumData[m.key],
      borderColor: m.color,
      backgroundColor: m.color + '18',
      borderWidth: 2,
      pointRadius: filtered.labels.length > 60 ? 0 : 2,
      pointHoverRadius: 4,
      tension: 0.35,
      fill: true,
    }));

  const ctx = document.getElementById('cum-canvas');
  if (!ctx) return;
  if (_cumChartInstance) _cumChartInstance.destroy();

  _cumChartInstance = new Chart(ctx, {
    type: 'line',
    data: { labels: filtered.labels, datasets },
    options: {
      responsive: true,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(1,58,82,.95)',
          titleColor: '#fff', bodyColor: 'rgba(255,255,255,.8)',
          padding: 10, cornerRadius: 8,
        },
      },
      scales: {
        x: {
          grid: { color: 'rgba(1,58,82,.04)' },
          ticks: { font:{ size:10, family:'Montserrat' }, color:'#8899a6', maxTicksLimit: 10, maxRotation: 0 },
        },
        y: {
          beginAtZero: true,
          grid: { color: 'rgba(1,58,82,.05)' },
          ticks: { font:{ size:10, family:'Montserrat' }, color:'#8899a6' },
        },
      },
    }
  });
}

function setCumPeriod(days) {
  _cumDays = days;
  document.querySelectorAll('.cum-pill').forEach(b => {
    const d = parseInt(b.textContent) || 0;
    const match = (days === 7 && b.textContent==='1W') || (days === 14 && b.textContent==='2W') ||
      (days === 21 && b.textContent==='3W') || (days === 30 && b.textContent==='1M') ||
      (days === 60 && b.textContent==='2M') || (days === 90 && b.textContent==='3M') ||
      (days === 365 && b.textContent==='1Y') || (days === 0 && b.textContent==='All');
    b.classList.toggle('active', match);
  });
  buildCumulativeChart();
}

function toggleCumMetric(key, checked) {
  if (checked && !_cumMetrics.includes(key)) _cumMetrics.push(key);
  if (!checked) _cumMetrics = _cumMetrics.filter(k => k !== key);
  buildCumulativeChart();
}
